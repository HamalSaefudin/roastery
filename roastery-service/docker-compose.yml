services:
  postgres:
    image: postgres:16-alpine
    container_name: roastery-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: roastery
    ports:
      - '5432:5432'
    volumes:
      - roastery_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d roastery']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  roastery_pgdata:
